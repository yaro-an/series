services:
  - type: web
    name: serial-series-app
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_DIR
        value: /var/data
    disk:
      name: serial-series-data
      mountPath: /var/data
      sizeGB: 1
